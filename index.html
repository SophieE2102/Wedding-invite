<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #eef5ee;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Georgia', serif;
}

/* Envelope */
.envelope {
  width: 320px;
  height: 220px;
  background: #6b8e6b;
  position: relative;
  border-radius: 6px;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #5a7d5a;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 2;
}

/* Wax Seal */
.seal {
  position: absolute;
  width: 60px;
  height: 60px;
  background: #8b0000;
  border-radius: 50%;
  top: 70px;
  left: 130px;
  z-index: 3;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.3s;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.seal:hover {
  transform: scale(1.1);
}

/* Seal breaking animation */
.break {
  animation: breakSeal 0.6s forwards;
}

@keyframes breakSeal {
  0% { transform: scale(1) rotate(0); opacity: 1; }
  50% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(0) rotate(-20deg); opacity: 0; }
}

/* Letter */
.letter {
  position: absolute;
  width: 92%;
  height: 92%;
  background: white;
  top: 4%;
  left: 4%;
  padding: 20px;
  box-sizing: border-box;
  transform: translateY(110%);
  transition: transform 1s ease;
  overflow-y: auto;
  z-index: 1;
}

/* Open states */
.open .flap {
  transform: rotateX(180deg);
}

.open .letter {
  transform: translateY(0);
}

/* Content styling */
h1 {
  text-align: center;
  font-size: 22px;
}

.names {
  text-align: center;
  font-size: 24px;
  margin: 10px 0;
}

.details {
  text-align: center;
  margin: 6px 0;
}

.section {
  margin-top: 12px;
  font-size: 14px;
}

.rsvp {
  text-align: center;
  margin-top: 15px;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  background: #6b8e6b;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #5a7d5a;
}
</style>

</head>

<body>

<div class="envelope" id="env">
  <div class="flap"></div>

  <!-- Wax Seal -->
  <div class="seal" id="seal" onclick="breakSeal()">💌</div>

  <!-- Letter -->
  <div class="letter">
    <h1>You’re Invited</h1>

    <div class="names">
      [Your Name] & [Partner Name]
    </div>

    <div class="details">
      [Wedding Date]
    </div>

    <div class="details">
      [Venue Name, Location]
    </div>

    <div class="section">
      <strong>Details:</strong><br>
      Ceremony at [time]<br>
      Reception to follow<br>
      Dress code: [optional]
    </div>

    <div class="section">
      <strong>Additional Info:</strong><br>
      Accommodation, transport, etc.
    </div>

    <div class="rsvp">
      <p><strong>RSVP</strong></p>
      <button onclick="alert('Replace with RSVP link')">Accept</button>
      <button onclick="alert('Replace with RSVP link')">Decline</button>
    </div>
  </div>
</div>

<script>
function breakSeal() {
  const seal = document.getElementById("seal");
  const envelope = document.getElementById("env");

  // Play break animation
  seal.classList.add("break");

  // After animation, open envelope
  setTimeout(() => {
    seal.style.display = "none";
    envelope.classList.add("open");
  }, 600);
}
</script>

</body>
</html>
